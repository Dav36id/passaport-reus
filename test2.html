<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Passaport Digital - Reus</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background-color: #f4f1e8;
}

h1 {
  margin-top: 30px;
}

.lloc {
  margin: 40px auto;
  padding: 20px;
  border: 2px solid #ccc;
  border-radius: 10px;
  background-color: white;
  width: 350px;
}

.lloc img.foto {
  width: 100%;
  border-radius: 8px;
  margin-bottom: 10px;
}

button {
  padding: 10px 20px;
  font-size: 14px;
  background-color: darkred;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

.segell {
  width: 120px;
  margin-top: 15px;
  display: none;
}
</style>
</head>

<body>

<h1>📘 Passaport Digital - Reus</h1>

<div class="lloc">
  <h2>Carrer Joan Martell</h2>
  <img class="foto" src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Reus_view.jpg">
  <button onclick="comprovarUbicacio('joanmartell')">Segellar</button>
  <br>
  <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Stamp_icon.png"
       class="segell"
       id="segell_joanmartell">
</div>

<div class="lloc">
  <h2>Plaça Llibertat</h2>
  <img class="foto" src="https://upload.wikimedia.org/wikipedia/commons/3/30/Plaça_de_la_Llibertat_Reus.jpg">
  <button onclick="comprovarUbicacio('llibertat')">Segellar</button>
  <br>
  <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Stamp_icon.png"
       class="segell"
       id="segell_llibertat">
</div>

<div class="lloc">
  <h2>Plaça Prim</h2>
  <img class="foto" src="https://upload.wikimedia.org/wikipedia/commons/1/17/Plaça_del_Prim_Reus.jpg">
  <button onclick="comprovarUbicacio('prim')">Segellar</button>
  <br>
  <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Stamp_icon.png"
       class="segell"
       id="segell_prim">
</div>

<script>

function comprovarUbicacio(lloc) {

  if (!navigator.geolocation) {
    alert("Geolocalització no compatible");
    return;
  }

  navigator.geolocation.getCurrentPosition(function(posicio) {

    const latUsuari = posicio.coords.latitude;
    const lonUsuari = posicio.coords.longitude;

    const llocs = {

      joanmartell: {
        lat: 41.1589,
        lon: 1.1088
      },

      llibertat: {
        lat: 41.1553,
        lon: 1.1069
      },

      prim: {
        lat: 41.1545,
        lon: 1.1083
      }

    };

    const latLloc = llocs[lloc].lat;
    const lonLloc = llocs[lloc].lon;

    const distancia = calcularDistancia(
      latUsuari,
      lonUsuari,
      latLloc,
      lonLloc
    );

    if (distancia < 0.8) { // 800 metres
      document.getElementById("segell_" + lloc).style.display = "block";
      localStorage.setItem("segell_" + lloc, "true");
      alert("Segell desbloquejat!");
    } else {
      alert("Has d'estar dins de 800 metres.");
    }

  });
}

function calcularDistancia(lat1, lon1, lat2, lon2) {

  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) *
    Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

window.onload = function() {

  ["joanmartell", "llibertat", "prim"].forEach(function(lloc) {
    if (localStorage.getItem("segell_" + lloc) === "true") {
      document.getElementById("segell_" + lloc).style.display = "block";
    }
  });

};

</script>

</body>
</html>
