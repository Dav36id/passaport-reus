<!DOCTYPE html>
<html lang="ca">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8b0000">
<meta charset="UTF-8">
<title>· Passaport Faller Falla Prado 2026 ·</title>

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}
</script>

<style>

html{scroll-behavior:smooth;}

body{
font-family:Arial;
margin:0;
background:#f4f1e8;
text-align:center;
}

.logo{
width:130px;
margin:30px auto;
display:block;
}

nav{
background:white;
padding:15px;
border-top:2px solid #ddd;
border-bottom:2px solid #ddd;
position:sticky;
top:0;
z-index:100;
}

nav ul{
display:flex;
justify-content:center;
gap:40px;
list-style:none;
padding:0;
margin:0;
}

nav a{
text-decoration:none;
font-weight:bold;
color:darkred;
font-size:18px;
}

.contador{
margin:20px;
font-size:22px;
font-weight:bold;
}

section{
padding:60px 20px;
}

#FallaPradoenRoig{background:#ffd6d6;}
#FallaPradoenBlau{background:#d6e6ff;}
#FallaPradoenVerd{background:#d6ffd9;}
#FallaPradoenMarro{background:#f0e0c9;}

.llocs{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.lloc{
background:white;
width:260px;
border-radius:12px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
position:relative;
}

.lloc img{
width:100%;
border-radius:8px;
}

button{
padding:10px 15px;
border:none;
background:darkred;
color:white;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

.segell{
position:absolute;
top:15px;
right:15px;
width:90px;
height:90px;
border:5px solid red;
border-radius:50%;
color:red;
font-weight:bold;
display:none;
align-items:center;
justify-content:center;
transform:rotate(-20deg);
background:rgba(255,0,0,0.1);
}

</style>
</head>

<body>

<img class="logo" src="https://dav36id.github.io/passaport-reus/escut.png">

<nav>
<ul>
<li><a href="#FallaPradoenRoig">#FallaPradoenRoig</a></li>
<li><a href="#FallaPradoenBlau">#FallaPradoenBlau</a></li>
<li><a href="#FallaPradoenVerd">#FallaPradoenVerd</a></li>
<li><a href="#FallaPradoenMarro">#FallaPradoenMarro</a></li>
</ul>
</nav>

<div class="contador">
Segells aconseguits: <span id="contador">0</span> / 24
</div>


<section id="FallaPradoenRoig">
<h2>#FallaPradoenRoig</h2>
<div class="llocs">

<div class="lloc"><div class="segell" id="segell_prado">VISITAT</div>
<h3>Falla Prado</h3>
<img src="https://www.cendradigital.com/wp-content/uploads/3-Falla-Prado-2025-1.jpg">
<button onclick="comprovarUbicacio('prado','Falla Prado')">Segellar</button></div>

<div class="lloc"><div class="segell" id="segell_passeig">VISITAT</div>
<h3>Falla Passeig</h3>
<img src="https://www.cendradigital.com/wp-content/uploads/5-Falla-Passeig-2025-1.jpg">
<button onclick="comprovarUbicacio('passeig','Falla Passeig')">Segellar</button></div>

<div class="lloc"><div class="segell" id="segell_dula">VISITAT</div>
<h3>Falla La Dula</h3>
<img src="https://www.cendradigital.com/wp-content/uploads/4-Falla-La-Dula-2025-1.jpg">
<button onclick="comprovarUbicacio('dula','Falla La Dula')">Segellar</button></div>

<div class="lloc"><div class="segell" id="segell_cambro">VISITAT</div>
<h3>Falla Cambro</h3>
<img src="https://www.cendradigital.com/wp-content/uploads/1-Falla-Cambro-2025-2.jpg">
<button onclick="comprovarUbicacio('cambro','Falla Cambro')">Segellar</button></div>

<div class="lloc"><div class="segell" id="segell_via">VISITAT</div>
<h3>Falla La Via</h3>
<img src="https://www.cendradigital.com/wp-content/uploads/6-Falla-La-Via-2025-1.jpg">
<button onclick="comprovarUbicacio('via','Falla La Via')">Segellar</button></div>

<div class="lloc"><div class="segell" id="segell_portal">VISITAT</div>
<h3>Falla Portal</h3>
<button onclick="comprovarUbicacio('portal','Falla Portal')">Segellar</button></div>

</div>
</section>


<script>

const llocs={

prado:{lat:41.1591,lon:1.1049},
passeig:{lat:41.1579,lon:1.1062},
dula:{lat:41.1601,lon:1.1038},
cambro:{lat:41.1568,lon:1.1047},
via:{lat:41.1585,lon:1.1071},
portal:{lat:41.1604,lon:1.1052},

platja:{lat:41.1572,lon:1.1035},
ullal:{lat:41.1610,lon:1.1060},
riuvaca:{lat:41.1564,lon:1.1059},
clot:{lat:41.1596,lon:1.1028},
goleta:{lat:41.1607,lon:1.1041},
cantus:{lat:41.1576,lon:1.1070},

creus:{lat:41.1612,lon:1.1034},
esther:{lat:41.1569,lon:1.1029},
mirador:{lat:41.1599,lon:1.1066},
cadireta:{lat:41.1580,lon:1.1019},
dunar:{lat:41.1605,lon:1.1072},
viaverda:{lat:41.1562,lon:1.1040},

esglesia:{lat:41.1588,lon:1.1055},
ajuntament:{lat:41.1594,lon:1.1032},
torre:{lat:41.1571,lon:1.1068},
mercat:{lat:41.1583,lon:1.1026},
ermita:{lat:41.1602,lon:1.1064},
calvari:{lat:41.1575,lon:1.1015}

};

function comprovarUbicacio(clau,nom){

navigator.geolocation.getCurrentPosition(function(pos){

const latU=pos.coords.latitude;
const lonU=pos.coords.longitude;

const latL=llocs[clau].lat;
const lonL=llocs[clau].lon;

const dist=calcularDistancia(latU,lonU,latL,lonL);

if(dist<0.2){
desbloquejarSegell(clau);
alert("✅ Segell desbloquejat a "+nom);
}else{
alert("❌ Has d'estar a menys de 200 metres");
}

});

}

function desbloquejarSegell(clau){

const segell=document.getElementById("segell_"+clau);

if(segell.style.display!="flex"){
segell.style.display="flex";
localStorage.setItem("segell_"+clau,"true");
actualitzarContador();
}

}

function calcularDistancia(lat1,lon1,lat2,lon2){

const R=6371;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

function actualitzarContador(){

let total=0;

for(let key in localStorage){
if(key.startsWith("segell_")) total++;
}

document.getElementById("contador").innerText=total;

}

window.onload=function(){

for(let key in localStorage){

if(key.startsWith("segell_")){
const id=key.replace("segell_","");
const el=document.getElementById("segell_"+id);
if(el) el.style.display="flex";
}

}

actualitzarContador();

}

</script>

</body>
</html>
